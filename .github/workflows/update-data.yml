name: Update hardware data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1 * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enrich specs from Wikidata
        run: node scripts/enrich-specs.mjs
        continue-on-error: true

      - name: Build data and pages
        run: npm run build
        env:
          SITE_URL: https://freebottleneckcalculator.com

      - name: Run tests
        run: npm test

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update hardware data and SEO pages"
          title: "Automated hardware data update"
          body: |
            Auto-generated by the update-data workflow.
            - Wikidata spec enrichment (if available)
            - Regenerated data/cpus.js and data/gpus.js from CSV sources
            - Regenerated SEO pages and sitemap.xml
          branch: automated/data-update
          delete-branch: true
